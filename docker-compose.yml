version: "3.8"

services:
  db:
    image: mongo:6
    container_name: db-container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://db:27017/simac
      - PORT=3001
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: